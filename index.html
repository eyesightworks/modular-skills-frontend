<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}
.card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:500px;
}
input,select,button{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}
button{background:#3b82f6;color:#fff;}
.logout{background:#ef4444;}
.preview{max-width:100%;display:none;}
.status{font-size:13px;color:#94a3b8;}
</style>
</head>

<body>

<div class="card">

<div id="loginSection">
<h2>Login</h2>
<input type="email" id="emailInput" placeholder="Email">
<input type="password" id="passwordInput" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
<h2>Upload Image</h2>

<select id="contentType" onchange="loadItems()">
<option value="">Select Type</option>
<option value="properties">Properties</option>
<option value="vehicles">Vehicles</option>
<option value="products">Products</option>
</select>

<select id="itemSelect"></select>

<input type="file" id="imageInput">

<button onclick="uploadImage()">Upload</button>

<div class="status" id="status"></div>
<img id="preview" class="preview">

<button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<script>

const API = "https://pharmacy-auto-realestate-backend.onrender.com/api";

// TOKEN
function saveToken(t){localStorage.setItem("token",t);}
function getToken(){return localStorage.getItem("token");}
function logout(){localStorage.removeItem("token");location.reload();}

// LOGIN
async function login(){

const email=document.getElementById("emailInput").value;
const password=document.getElementById("passwordInput").value;

const res=await fetch(API+"/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data=await res.json();
console.log("LOGIN:", data);

if(data.access_token){
saveToken(data.access_token);
dashboard.style.display="block";
loginSection.style.display="none";
}else{
alert("Login failed");
}
}

// LOAD ITEMS
async function loadItems(){

const type=document.getElementById("contentType").value;

const res=await fetch(API+"/"+type,{
headers:{Authorization:"Bearer "+getToken()}
});

console.log("STATUS:", res.status);

const data=await res.json();
console.log("DATA:", data);

const select=document.getElementById("itemSelect");
select.innerHTML="";

data.forEach(i=>{
select.innerHTML+=`<option value="${i.id}">${i.title || i.name}</option>`;
});
}

// UPLOAD
async function uploadImage(){

const file=document.getElementById("imageInput").files[0];
const type=document.getElementById("contentType").value;
const id=document.getElementById("itemSelect").value;

if(!file || !type || !id){
alert("Fill everything");
return;
}

try{

status.innerText="Getting signature...";

// ✅ FIXED (IMPORTANT)
const signRes=await fetch(API+"/cloudinary/sign",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+getToken()
},
body:JSON.stringify({
public_id: "img_" + Date.now()
})
});

const signData=await signRes.json();
console.log("SIGN:", signData);

status.innerText="Uploading...";

const fd=new FormData();
fd.append("file",file);
fd.append("api_key",signData.api_key);
fd.append("timestamp",signData.timestamp);
fd.append("signature",signData.signature);

const uploadRes=await fetch(
`https://api.cloudinary.com/v1_1/${signData.cloud_name}/image/upload`,
{method:"POST",body:fd}
);

const uploadData=await uploadRes.json();
console.log("CLOUDINARY:", uploadData);

if(!uploadData.secure_url){
throw new Error("Cloudinary failed");
}

status.innerText="Saving...";

const saveRes=await fetch(API+"/"+type+"/"+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+getToken()
},
body:JSON.stringify({
imageUrl: uploadData.secure_url,
public_id: uploadData.public_id
})
});

const saveData=await saveRes.json();
console.log("SAVE:", saveData);

status.innerText="Done!";
preview.src=uploadData.secure_url;
preview.style.display="block";

}catch(err){
console.error(err);
status.innerText="Error occurred";
}
}

</script>

</body>
</html>
